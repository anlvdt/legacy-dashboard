<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Legacy Frame Lite</title>
    <style>
        /* ================================================================
         * Legacy Frame Lite — Responsive via JS root font-size
         * Strategy: fitPage() sets html font-size = viewport_unit px
         * where viewport_unit = min(vw, vh) / 10 (capped 8px-20px)
         * All sizing uses em — scales correctly on any DPI/screen size
         * ================================================================ */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* font-size set dynamically by fitPage() JS */
        }

        body {
            background: #0a0a12;
            color: #F5F5F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── PAGE WRAPPER: display:table — iOS 9 compatible ── */
        .page-wrapper {
            position: relative;
            display: table;
            table-layout: fixed;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            background: -webkit-gradient(linear, left top, right bottom, color-stop(0%, #0f0c29), color-stop(50%, #302b63), color-stop(100%, #24243e));
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            -webkit-background-size: cover;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ── TOP BAR ── */
        .top-bar { display: table-row; }
        .top-bar-cell {
            display: table-cell;
            vertical-align: middle;
            padding: 0.3em 0.8em;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.2em;
        }

        .news-scroller {
            display: inline-block;
            vertical-align: middle;
            width: calc(100% - 3.2em);
            height: 2.6em;
            line-height: 2.6em;
            overflow: hidden;
            white-space: nowrap;
        }

        .top-news-content {
            display: inline-block;
            white-space: nowrap;
            line-height: 2.6em;
        }

        .news-item {
            display: inline;
            font-size: 1.5em;
            padding: 0 0.5em;
            color: rgba(255, 255, 255, 0.9);
        }

        .news-sep {
            color: #f39c12;
            padding: 0 0.3em;
            font-size: 1.5em;
        }

        .news-tag {
            color: #f39c12;
            font-weight: 700;
            font-size: 1.3em;
            margin-right: 0.2em;
        }

        /* CSS marquee animation */
        .marquee-animated {
            display: inline-block;
            -webkit-animation: marquee-scroll 60s linear infinite;
            animation: marquee-scroll 60s linear infinite;
            will-change: -webkit-transform;
        }

        @-webkit-keyframes marquee-scroll {
            0%   { -webkit-transform: translateX(0); }
            100% { -webkit-transform: translateX(-50%); }
        }
        @keyframes marquee-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* ── CONTENT ROW ── */
        .content-row { display: table-row; height: 100%; background: none; }
        .content-cell {
            display: table-cell;
            vertical-align: top;
            background: rgba(0, 0, 0, 0.45);
            overflow: hidden;
        }

        .content-wrapper {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: horizontal;
            -webkit-flex-direction: row;
            flex-direction: row;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar { display: table-row; }
        .bottom-bar-cell {
            display: table-cell;
            vertical-align: middle;
            height: 3em;
            background: rgba(0, 0, 0, 0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        .fx-label {
            display: inline-block;
            vertical-align: top;
            white-space: nowrap;
            padding: 0 0.7em;
            font-size: 1em;
            font-weight: 700;
            color: #f39c12;
            line-height: 3em;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
        }

        .fx-track {
            display: inline-block;
            vertical-align: top;
            overflow: hidden;
            height: 3em;
            line-height: 3em;
            white-space: nowrap;
        }

        .fx-content { display: inline-block; white-space: nowrap; line-height: 3em; }
        .fx-item { display: inline; font-size: 1em; padding: 0 0.5em; }
        .fx-code { color: #f39c12; font-weight: 700; }
        .fx-val  { color: rgba(255, 255, 255, 0.9); margin-left: 0.3em; }
        .fx-sep  { color: rgba(255, 255, 255, 0.3); padding: 0 0.3em; }

        /* ── COLUMNS ── */
        .col-left {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-box-pack: justify;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-flex: 1.1;
            -webkit-flex: 1.1 1 0;
            flex: 1.1 1 0;
            min-width: 0;
            padding: 1.2em 1em;
            overflow: hidden;
        }

        .col-right {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-box-pack: flex-start;
            -webkit-justify-content: flex-start;
            justify-content: flex-start;
            -webkit-box-align: stretch;
            -webkit-align-items: stretch;
            align-items: stretch;
            -webkit-box-flex: 1;
            -webkit-flex: 1 1 0;
            flex: 1 1 0;
            min-width: 0;
            padding: 0.6em 0.8em;
            overflow: hidden;
        }

        /* ── CLOCK ── */
        .clock-wrapper {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            width: 100%;
        }

        #digital-clock {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            white-space: nowrap;
        }

        .clock-seg {
            background: rgba(20, 20, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.25em;
            padding: 0.05em 0.25em;
            -webkit-box-shadow: 0 0.1em 0.4em rgba(0, 0, 0, 0.6);
            box-shadow: 0 0.1em 0.4em rgba(0, 0, 0, 0.6);
        }

        .clock-seg span {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: 800;
            font-size: 7em;
            color: #fff;
            letter-spacing: 0.03em;
            text-shadow: 0 0.05em 0.2em rgba(0, 0, 0, 0.8);
            display: block;
            line-height: 1.05;
        }

        .clock-sep {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: 800;
            font-size: 4.4em;
            color: #fff;
            margin: 0 0.1em;
            text-shadow: 0 0.05em 0.2em rgba(0, 0, 0, 0.8);
        }

        @-webkit-keyframes blink { 50% { opacity: 0.15; } }
        @keyframes blink         { 50% { opacity: 0.15; } }
        .colon-blink { -webkit-animation: blink 1s infinite; animation: blink 1s infinite; }

        /* ── INFO GROUP ── */
        .info-group {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: column;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
        }

        .event-countdown {
            text-align: center;
            font-size: 0.9em;
            font-weight: 700;
            color: #7ecfff;
            padding: 0.2em 0;
        }

        .date-box, .weather-box {
            font-weight: 700;
            padding: 0.3em 0.9em;
            background: rgba(15, 15, 20, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.35em;
            -webkit-box-shadow: 0 0.1em 0.4em rgba(0, 0, 0, 0.5);
            box-shadow: 0 0.1em 0.4em rgba(0, 0, 0, 0.5);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .date-box { font-size: 1.35em; }
        .date-box p { margin: 0.1em 0; }
        #greg-date { font-weight: 700; }
        #lunar-date { color: #f39c12; }

        .weather-box { font-size: 1.15em; margin-top: 0.3em; }
        #weather-loc { color: rgba(255, 255, 255, 0.7); font-size: 0.85em; margin-bottom: 0.15em; }

        .weather-line {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
        }
        .weather-line > span { margin: 0 0.3em; }
        #weather-desc { font-size: 0.9em; font-weight: 400; opacity: 0.8; }

        /* ── QUOTE ── */
        .quote-wrap { padding: 0.3em 0.5em; text-align: center; }
        .quote-text {
            font-size: 1.15em;
            font-style: italic;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }
        .quote-author { font-size: 0.9em; color: #f39c12; margin-top: 0.2em; }

        /* ── CALENDAR ── */
        #cal-container {
            background: rgba(20, 20, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.5em;
            border-radius: 0.4em;
            width: 100%;
            max-width: 100%;
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            -webkit-box-shadow: 0 0.15em 0.5em rgba(0, 0, 0, 0.6);
            box-shadow: 0 0.15em 0.5em rgba(0, 0, 0, 0.6);
            -webkit-transform-origin: top center;
            transform-origin: top center;
        }

        #cal-header {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            width: 100%;
        }

        #cal-title {
            -webkit-box-flex: 1;
            -webkit-flex: 1;
            flex: 1;
            font-size: 0.85em;
            font-weight: 700;
            text-align: center;
        }

        .cal-nav {
            cursor: pointer;
            font-size: 0.85em;
            -webkit-user-select: none;
            user-select: none;
            padding: 0.2em 0.5em;
        }

        #cal-grid { margin-top: 0.15em; }
        #cal-grid::after { content: ""; display: table; clear: both; }

        .cal-cell {
            float: left;
            width: 14.28%;
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            position: relative;
        }

        .cal-cell::before {
            content: '';
            display: block;
            padding-top: 80%;
        }

        .cal-inner {
            position: absolute;
            top: 1px; right: 1px; bottom: 1px; left: 1px;
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-orient: vertical;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            text-align: center;
        }

        .day-hdr .cal-inner { font-weight: 700; color: #f39c12; font-size: 0.85em; }
        .solar-d { font-size: 1em; font-weight: 700; display: block; }
        .lunar-d { font-size: 0.65em; display: block; color: #f39c12; opacity: 0.8; }
        .other-m { opacity: 0.3; }

        .today-cell .cal-inner {
            background-color: rgba(243, 156, 18, 0.85);
            color: #000;
            border-radius: 0.2em;
            font-weight: 800;
            -webkit-box-shadow: 0 0.1em 0.3em rgba(0, 0, 0, 0.5);
            box-shadow: 0 0.1em 0.3em rgba(0, 0, 0, 0.5);
        }
        .today-cell .lunar-d { color: #000; }

        /* ===== PORTRAIT: stack vertically ===== */
        @media screen and (orientation: portrait) {
            .content-wrapper {
                -webkit-box-orient: vertical;
                -webkit-flex-direction: column;
                flex-direction: column;
            }
            .col-left {
                -webkit-box-flex: 0;
                -webkit-flex: 0 0 auto;
                flex: 0 0 auto;
                width: 100%;
                padding: 0.4em 0.8em;
            }
            .col-right {
                -webkit-box-flex: 1;
                -webkit-flex: 1 1 auto;
                flex: 1 1 auto;
                width: 100%;
                padding: 0.4em 0.8em;
            }
            .clock-seg span { font-size: 4em; }
            .clock-sep { font-size: 2.5em; }
            .clock-wrapper { margin-bottom: 0.3em; }
            .info-group { margin-bottom: 0.3em; }
        }

        .lite-badge {
            position: fixed;
            bottom: 3.5em;
            right: 0.5em;
            font-size: 0.65em;
            color: rgba(255, 255, 255, 0.35);
            pointer-events: none;
            z-index: 999;
        }

        /* TTS Speaker Button */
        #tts-btn {
            display: -webkit-inline-box;
            display: -webkit-inline-flex;
            display: inline-flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            width: 2.4em;
            height: 2.4em;
            min-width: 2.4em;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -ms-touch-action: manipulation;
            touch-action: manipulation;
            margin-right: 0.4em;
            vertical-align: middle;
        }

        #tts-btn svg {
            width: 1.3em;
            height: 1.3em;
            fill: #f39c12;
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <!-- page-wrapper: display:table with 3 rows -->
    <div class="page-wrapper">

        <!-- ROW 1: Top bar (44px) -->
        <div class="top-bar">
            <div class="top-bar-cell">
                <div id="tts-btn"><svg viewBox="0 0 24 24">
                        <path
                            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                    </svg></div>
                <div class="news-scroller" style="display:inline-block;vertical-align:middle;width:calc(100% - 50px)">
                    <span class="top-news-content" id="news-content">
                        <span class="news-item">Đang tải tin tức...</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- ROW 2: Content (auto-fill remaining height) -->
        <div class="content-row">
            <div class="content-cell">
                <div class="content-wrapper">

                    <!-- LEFT COLUMN: Clock + Date/Weather + Quote -->
                    <div class="col-left">
                        <div class="clock-wrapper">
                            <div id="digital-clock">
                                <div class="clock-seg"><span id="c-hours">00</span></div>
                                <div class="clock-sep colon-blink">:</div>
                                <div class="clock-seg"><span id="c-minutes">00</span></div>
                            </div>
                        </div>
                        <div class="info-group">
                            <div class="date-box">
                                <p id="greg-date"></p>
                                <p id="lunar-date"></p>
                            </div>
                            <div class="event-countdown" id="top-countdown"></div>
                            <div class="weather-box">
                                <div id="weather-loc">Đang tải...</div>
                                <div class="weather-line">
                                    <span id="weather-icon"></span>
                                    <span id="weather-temp"></span>
                                    <span id="weather-desc">Đang tải thời tiết...</span>
                                </div>
                            </div>
                        </div>
                        <div class="quote-wrap">
                            <div class="quote-text" id="quote-text">...</div>
                            <div class="quote-author" id="quote-author">Việt Nam</div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: Calendar -->
                    <div class="col-right">
                        <div id="cal-container">
                            <div id="cal-header">
                                <div class="cal-nav" id="cal-prev">&lt;</div>
                                <div id="cal-title"></div>
                                <div class="cal-nav" id="cal-next">&gt;</div>
                            </div>
                            <div id="cal-grid"></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- ROW 3: Bottom bar (48px) -->
        <div class="bottom-bar">
            <div class="bottom-bar-cell">
                <span class="fx-label">💱 Tỷ giá</span>
                <span class="fx-track">
                    <span class="fx-content" id="fx-content">
                        <span class="fx-item">Đang tải tỷ giá...</span>
                    </span>
                </span>
            </div>
        </div>

    </div>


    <div class="lite-badge">Legacy Frame Lite</div>

    <script>
        /**
         * Legacy Frame Lite — ES5 only, single file, no external dependencies
         * Designed for: iOS < 10, Android < 5, Chrome < 40
         */
        (function () {
            if (typeof document === 'undefined') { return; }

            /* ============================================================
             * POLYFILL: requestAnimationFrame
             * ============================================================ */
            if (typeof window !== 'undefined' && !window.requestAnimationFrame) {
                window.requestAnimationFrame = function (fn) { return setTimeout(fn, 16); };
            }

            /* ============================================================
             * FIT PAGE TO VISIBLE VIEWPORT
             *
             * Strategy:
             *  1. Measure true visible viewport (window.innerHeight accounts
             *     for iOS Safari chrome). Add a small buffer for iOS toolbar.
             *  2. Compute a "unit" = visible_h / 30 so the whole layout fits
             *     in ~30 units vertically. Clamp to [6px, 18px].
             *  3. Set html font-size = unit px → all em-based sizes scale.
             *  4. Explicitly size page-wrapper, content-cell, content-wrapper
             *     so display:table rows fill the screen correctly.
             *  5. Scale calendar down if it still overflows col-right.
             *
             * DPI / high-DPI: window.innerWidth/Height are already in CSS px
             * (device-independent pixels), so devicePixelRatio doesn't affect
             * the layout math — the browser handles physical pixel mapping.
             * ============================================================ */
            var pageWrapper = document.querySelector('.page-wrapper');
            var topBarCell = document.querySelector('.top-bar-cell');
            var bottomBarCell = document.querySelector('.bottom-bar-cell');
            var contentCell = document.querySelector('.content-cell');
            var contentWrapper = document.querySelector('.content-wrapper');

            function scaleCalendar() {
                var calContainer = document.getElementById('cal-container');
                var colRight = document.querySelector('.col-right');
                if (!calContainer || !colRight) { return; }

                // Reset transform first so we measure natural size
                calContainer.style.webkitTransform = '';
                calContainer.style.transform = '';
                calContainer.style.marginBottom = '';
                calContainer.style.width = '';

                // Also constrain width to col-right
                var availW = colRight.offsetWidth;
                if (availW > 0) {
                    calContainer.style.width = availW + 'px';
                }

                var availH = colRight.offsetHeight;
                var naturalH = calContainer.offsetHeight;

                if (availH > 0 && naturalH > 0 && naturalH > availH * 0.95) {
                    var s = (availH * 0.94) / naturalH;
                    // Also check width constraint
                    var naturalW = calContainer.offsetWidth;
                    if (availW > 0 && naturalW > 0) {
                        var sw = (availW * 0.98) / naturalW;
                        if (sw < s) { s = sw; }
                    }
                    calContainer.style.webkitTransform = 'scale(' + s + ')';
                    calContainer.style.transform = 'scale(' + s + ')';
                    calContainer.style.webkitTransformOrigin = 'top center';
                    calContainer.style.transformOrigin = 'top center';
                    // Collapse dead space below the scaled-down element
                    calContainer.style.marginBottom = '-' + Math.ceil(naturalH * (1 - s)) + 'px';
                }
            }

            function fitPage() {
                if (!pageWrapper) { return; }

                // CSS pixels — device-independent, DPI handled by browser
                var vw = window.innerWidth  || document.documentElement.clientWidth  || 1024;
                var vh = window.innerHeight || document.documentElement.clientHeight || 768;

                // iOS Safari: innerHeight already reflects visible area.
                // Guard against toolbar on narrow portrait phones.
                var isPortrait = vh > vw;
                var iosBrowserGuard = (isPortrait && vw < 500) ? 50 : 0;
                var h = vh - iosBrowserGuard;
                if (h < 200) { h = vh; }

                // Size the table wrapper to exactly the visible area
                pageWrapper.style.width  = vw + 'px';
                pageWrapper.style.height = h  + 'px';

                /* ── ROOT FONT SIZE ──────────────────────────────────────
                 * Use BOTH dimensions so layout fits in either orientation.
                 *
                 * Landscape (vw > vh):
                 *   - Height is the constraint. Two columns side by side.
                 *   - Budget: top(3.2u) + content(23.8u) + bottom(3u) = 30u
                 *   - unit = h / 30
                 *
                 * Portrait (vh > vw):
                 *   - Width is the constraint. Columns stack vertically.
                 *   - Clock + info + calendar stacked → more vertical space.
                 *   - unit = vw / 20  (fits clock + calendar in width)
                 *
                 * Take the smaller of the two so nothing overflows.
                 * Clamp [7px, 22px].
                 * ──────────────────────────────────────────────────────── */
                var unitH = h / 30;
                var unitW = isPortrait ? (vw / 20) : (vw / 50);
                var unit = Math.min(unitH, unitW);
                if (unit < 7)  { unit = 7; }
                if (unit > 22) { unit = 22; }
                document.documentElement.style.fontSize = unit + 'px';

                /* ── CONTENT CELL HEIGHT ─────────────────────────────────
                 * Force content-cell to fill remaining height after bars.
                 * ──────────────────────────────────────────────────────── */
                if (contentCell && contentWrapper) {
                    var topH = (topBarCell && topBarCell.offsetHeight > 0)
                        ? topBarCell.offsetHeight : Math.round(3.2 * unit);
                    var botH = (bottomBarCell && bottomBarCell.offsetHeight > 0)
                        ? bottomBarCell.offsetHeight : Math.round(3.0 * unit);
                    var cellH = h - topH - botH;
                    if (cellH < 80) { cellH = 80; }
                    contentCell.style.height = cellH + 'px';
                    contentWrapper.style.height = cellH + 'px';
                }

            var THANG = ['Giêng', 'Hai', 'Ba', 'Tư', 'Năm', 'Sáu', 'Bảy', 'Tám', 'Chín', 'Mười', 'Mười Một', 'Chạp'];
            var THU = ['Chủ nhật', 'Thứ hai', 'Thứ ba', 'Thứ tư', 'Thứ năm', 'Thứ sáu', 'Thứ bảy'];

            /**
             * Julian Day Number from Gregorian date
             */
            function jdn(d, m, y) {
                var a = Math.floor((14 - m) / 12);
                var yy = y + 4800 - a;
                var mm = m + 12 * a - 3;
                var j = d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
                if (j < 2299161) {
                    j = d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) - 32083;
                }
                return j;
            }

            /**
             * New Moon JD (Ho Ngoc Duc / Meeus — chính xác)
             */
            function newMoonJD(k) {
                var T = k / 1236.85;
                var T2 = T * T;
                var T3 = T2 * T;
                var dr = Math.PI / 180;
                var Jd1 = 2415020.75933 + 29.53058868 * k + 0.0001178 * T2 - 0.000000155 * T3;
                Jd1 = Jd1 + 0.00033 * Math.sin((166.56 + 132.87 * T - 0.009173 * T2) * dr);
                var M = 359.2242 + 29.10535608 * k - 0.0000333 * T2 - 0.00000347 * T3;
                var Mpr = 306.0253 + 385.81691806 * k + 0.0107306 * T2 + 0.00001236 * T3;
                var F = 21.2964 + 390.67050646 * k - 0.0016528 * T2 - 0.00000239 * T3;
                var C1 = (0.1734 - 0.000393 * T) * Math.sin(M * dr) + 0.0021 * Math.sin(2 * dr * M);
                C1 = C1 - 0.4068 * Math.sin(Mpr * dr) + 0.0161 * Math.sin(dr * 2 * Mpr);
                C1 = C1 - 0.0004 * Math.sin(dr * 3 * Mpr);
                C1 = C1 + 0.0104 * Math.sin(dr * 2 * F) - 0.0051 * Math.sin(dr * (M + Mpr));
                C1 = C1 - 0.0074 * Math.sin(dr * (M - Mpr)) + 0.0004 * Math.sin(dr * (2 * F + M));
                C1 = C1 - 0.0004 * Math.sin(dr * (2 * F - M)) - 0.0006 * Math.sin(dr * (2 * F + Mpr));
                C1 = C1 + 0.0010 * Math.sin(dr * (2 * F - Mpr)) + 0.0005 * Math.sin(dr * (2 * Mpr + M));
                var JdNew;
                if (T < -11) {
                    JdNew = Jd1 + 0.000297 - 0.00011 * T - 0.000001 * T2 + C1;
                } else {
                    JdNew = Jd1 + C1;
                }
                return JdNew;
            }

            /**
             * Sun longitude at JD (radians — Ho Ngoc Duc / Meeus)
             */
            function sunLongitude(jd) {
                var T = (jd - 2451545.0) / 36525.0;
                var T2 = T * T;
                var dr = Math.PI / 180;
                var M = 357.5291 + 35999.0503 * T - 0.0001559 * T2 - 0.00000048 * T * T2;
                var L0 = 280.46645 + 36000.76983 * T + 0.0003032 * T2;
                var DL = (1.9146 - 0.004817 * T - 0.000014 * T2) * Math.sin(dr * M);
                DL = DL + (0.019993 - 0.000101 * T) * Math.sin(dr * 2 * M) + 0.00029 * Math.sin(dr * 3 * M);
                var theta = L0 + DL;
                var omega = 125.04 - 1934.136 * T;
                var L = theta - 0.00569 - 0.00478 * Math.sin(omega * dr);
                L = L * dr;
                L = L - Math.PI * 2 * Math.floor(L / (Math.PI * 2));
                return L;
            }

            function getNewMoonDay(k, timeZone) {
                return Math.floor(newMoonJD(k) + 0.5 + timeZone / 24.0);
            }

            function getSunLon(jd, timeZone) {
                return Math.floor(sunLongitude(jd - 0.5 - timeZone / 24.0) / Math.PI * 6);
            }

            function getLunarMonth11(yy, timeZone) {
                var off = jdn(31, 12, yy) - 2415021;
                var k = Math.floor(off / 29.530588853);
                var nm = getNewMoonDay(k, timeZone);
                var sl = getSunLon(nm, timeZone);
                if (sl >= 9) {
                    nm = getNewMoonDay(k - 1, timeZone);
                }
                return nm;
            }

            function getLeapMonthOffset(a11, timeZone) {
                var k = Math.floor((a11 - 2415021.076998695) / 29.530588853 + 0.5);
                var last = 0;
                var i = 1;
                var arc = getSunLon(getNewMoonDay(k + i, timeZone), timeZone);
                do {
                    last = arc;
                    i++;
                    arc = getSunLon(getNewMoonDay(k + i, timeZone), timeZone);
                } while (arc !== last && i < 14);
                return i - 1;
            }

            /**
             * Convert solar date to lunar date
             * Returns {day, month, year, leap, yearName}
             */
            function solarToLunar(dd, mm, yy) {
                var timeZone = 7; // Vietnam
                var dayNumber = jdn(dd, mm, yy);
                var k = Math.floor((dayNumber - 2415021.076998695) / 29.530588853);
                var monthStart = getNewMoonDay(k + 1, timeZone);
                if (monthStart > dayNumber) {
                    monthStart = getNewMoonDay(k, timeZone);
                }
                var a11 = getLunarMonth11(yy, timeZone);
                var b11 = a11;
                var lunarYear;
                if (a11 >= monthStart) {
                    lunarYear = yy;
                    a11 = getLunarMonth11(yy - 1, timeZone);
                } else {
                    lunarYear = yy + 1;
                    b11 = getLunarMonth11(yy + 1, timeZone);
                }
                var lunarDay = dayNumber - monthStart + 1;
                var diff = Math.floor((monthStart - a11) / 29);
                var lunarLeap = 0;
                var lunarMonth = diff + 11;
                if (b11 - a11 > 365) {
                    var leapOff = getLeapMonthOffset(a11, timeZone);
                    if (diff >= leapOff) {
                        lunarMonth = diff + 10;
                        if (diff === leapOff) {
                            lunarLeap = 1;
                        }
                    }
                }
                if (lunarMonth > 12) { lunarMonth = lunarMonth - 12; }
                if (lunarMonth >= 11 && diff < 4) { lunarYear -= 1; }

                var canYear = CAN[(lunarYear + 6) % 10];
                var chiYear = CHI[(lunarYear + 8) % 12];

                return {
                    day: lunarDay,
                    month: lunarMonth,
                    year: lunarYear,
                    leap: lunarLeap,
                    yearName: canYear + ' ' + chiYear
                };
            }

                xhr.open('GET', url, true);

                xhr.onreadystatechange = function () {
                    if (xhr.readyState !== 4 || done) { return; }
                    done = true;
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try { callback(null, JSON.parse(xhr.responseText)); }
                        catch (e) { callback(e, null); }
                    } else { callback(new Error('HTTP ' + xhr.status), null); }
                };
                xhr.ontimeout = function () { if (!done) { done = true; callback(new Error('timeout'), null); } };
                xhr.onerror = function () { if (!done) { done = true; callback(new Error('network'), null); } };
                xhr.send(null);

            function renderCalendar(baseDate) {

                        inner.appendChild(lunarSpan);

                    { y: 2030, m: 2, d: 3, name: 'Tết Canh Tuất' }
                ];

                var nearest = null;
                var minDays = 999;

                // Check regular events
                var i, evDate, diff;
                for (i = 0; i < events.length; i++) {
                    evDate = new Date(y, events[i].m - 1, events[i].d);
                    if (evDate < now) { evDate = new Date(y + 1, events[i].m - 1, events[i].d); }
                    diff = Math.ceil((evDate - now) / 86400000);
                    if (diff >= 0 && diff < minDays) {
                        minDays = diff;
                        nearest = { name: events[i].name, days: diff, emoji: events[i].emoji };
                    }
                }

                // Check Tết
                for (i = 0; i < tetDates.length; i++) {
                    evDate = new Date(tetDates[i].y, tetDates[i].m - 1, tetDates[i].d);
                    diff = Math.ceil((evDate - now) / 86400000);
                    if (diff >= 0 && diff < minDays) {
                        minDays = diff;
                        nearest = { name: tetDates[i].name, days: diff, emoji: '🎆' };

            var parsedNewsItems = [];

            function buildMarquee() {
                if (!newsContentEl) { return; }
                var allItems = [];
                var i;
                // Tech news lên đầu (tag [CN]), tin thường theo sau
                for (i = 0; i < parsedTechItems.length; i++) {
                    allItems.push({ title: parsedTechItems[i].title, tag: 'CN' });
                }
                for (i = 0; i < parsedNewsItems.length; i++) {
                    allItems.push({ title: parsedNewsItems[i].title, tag: '' });
                }
                if (!allItems.length) { return; }
                var html = '';
                for (i = 0; i < allItems.length; i++) {
                    if (allItems[i].tag) {
                        html += '<span class="news-tag">[' + allItems[i].tag + ']</span>';
                    }
                    html += '<span class="news-item">' + allItems[i].title + '</span>';
                    if (i < allItems.length - 1) { html += '<span class="news-sep">\u00b7</span>'; }
                }
                newsContentEl.innerHTML = html + '<span class="news-sep">\u00b7</span>' + html;
                startNewsScroll();
            }

            function renderNews(items) {
                if (!items || !items.length) { return; }
                parsedNewsItems = items;
                buildMarquee();
            }

            function startNewsScroll() {
                if (!newsContentEl) { return; }
                if (newsAnimId) { clearTimeout(newsAnimId); }
                newsContentEl.style.webkitTransform = '';
                newsContentEl.style.transform = '';
                var w = newsContentEl.scrollWidth;
                var duration = Math.max(w / 60, 15);
                newsContentEl.style.webkitAnimationDuration = duration + 's';
                newsContentEl.style.animationDuration = duration + 's';
                newsContentEl.className = 'top-news-content marquee-animated';
            }

                xhrGet('/api/news-summary', function (err, data) {

                            newsContentEl.innerHTML = '<span class="news-item">Không thể tải tin tức</span>';

                    renderNews(data.items);

            /* ============================================================

            var fxContentEl = document.getElementById('fx-content');
            var fxAnimId = null;
            var fxPos = 0;
            var FX_CURRENCIES = ['EUR', 'JPY', 'GBP', 'CNY', 'KRW', 'THB', 'AUD', 'SGD'];

            function fxFmt(num) {
                var str = num.toString();
                var result = '';
                var count = 0;
                for (var i = str.length - 1; i >= 0; i--) {
                    result = str[i] + result;
                    count++;
                    if (count % 3 === 0 && i > 0 && str[i - 1] !== '-') {
                        result = '.' + result;
                    }
                }
                return result;
            }

            function renderFxTicker(items) {
                if (!fxContentEl || items.length === 0) { return; }
                var html = '';
                var i;
                for (i = 0; i < items.length; i++) {
                    html += '<span class="fx-item"><span class="fx-code">' + items[i].code + '</span> <span class="fx-val">' + items[i].value + items[i].unit + '</span></span>';
                    if (i < items.length - 1) {
                        html += '<span class="fx-sep">·</span>';
                    }
                }
                // Duplicate for seamless loop
                fxContentEl.innerHTML = html + '<span class="fx-sep">·</span>' + html;
                startFxScroll();
            }

            function startFxScroll() {
                if (!fxContentEl) { return; }
                if (fxAnimId) { clearTimeout(fxAnimId); }
                fxContentEl.style.webkitTransform = '';
                fxContentEl.style.transform = '';
                var w = fxContentEl.scrollWidth;
                var duration = Math.max(w / 30, 20);
                fxContentEl.style.webkitAnimationDuration = duration + 's';
                fxContentEl.style.animationDuration = duration + 's';
                fxContentEl.className = 'fx-content marquee-animated';
            }

            function loadFxData() {
                var proxyUrl = '/api/proxy?url=' + encodeURIComponent('https://open.er-api.com/v6/latest/USD');
                xhrGet(proxyUrl, function (err, data) {
                    if (err || !data || !data.rates || !data.rates.VND) {
                        if (fxContentEl) {
                            fxContentEl.innerHTML = '<span class="fx-item">Không thể tải tỷ giá</span>';
                        }
                        return;
                    }
                    var items = [];
                    var usdVnd = data.rates.VND;
                    items.push({ code: 'USD', value: fxFmt(Math.round(usdVnd)), unit: '' });

                    var i, code, rate, vndRate;
                    for (i = 0; i < FX_CURRENCIES.length; i++) {
                        code = FX_CURRENCIES[i];
                        rate = data.rates[code];
                        if (rate && rate > 0) {
                            vndRate = usdVnd / rate;
                            if (code === 'JPY' || code === 'KRW') {
                                items.push({ code: code, value: fxFmt(Math.round(vndRate * 100)), unit: '/100' });
                            } else {
                                items.push({ code: code, value: fxFmt(Math.round(vndRate)), unit: '' });
                            }
                        }
                    }
                    renderFxTicker(items);
                }, 15000);
            }

            setInterval(loadFxData, 1800000); // Refresh every 30 min

            function ttsNormalize(text) {
                if (!text) { return ''; }
                var str = text;
                // Xóa URL trước
                str = str.replace(/https?:\/\/\S+/g, '');
                var i, key, val;
                for (i = 0; i < ttsDict.length; i++) {
                    key = ttsDict[i][0];
                    val = ttsDict[i][1];
                    if (key.length <= 3 && /^[A-Za-z0-9]+$/.test(key)) {
                        str = str.replace(new RegExp('\\b' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'g'), val);
                    } else {
                        str = str.split(key).join(val);
                    }
                }
                str = str.replace(/[_\[\]{}|\\^~`<>]/g, ' ');
                str = str.replace(/\s{2,}/g, ' ').replace(/^\s+|\s+$/g, '');
                return str;
            }

            function ttsUpdateBtn(reading) {
                if (ttsBtn) { ttsBtn.innerHTML = reading ? SVG_STOP : SVG_SPEAKER; }
            }

            // DUAL audio elements for gapless playback — preload next while current plays
            var ttsAudioA = document.createElement('audio');
            var ttsAudioB = document.createElement('audio');
            ttsAudioA.setAttribute('preload', 'auto');
            ttsAudioB.setAttribute('preload', 'auto');
            var ttsCurrentAudio = ttsAudioA; // which one is currently playing

            // Chia text thành chunks (~1200 ký tự) tại dấu câu
            function ttsSplitText(text) {
                var MAX_CHUNK = 1200;
                if (!text || text.length <= MAX_CHUNK) { return [text]; }
                var chunks = [];
                var remaining = text;
                while (remaining.length > MAX_CHUNK) {
                    var cut = remaining.substring(0, MAX_CHUNK);
                    var lastDot = -1;
                    var i;
                    var breaks = ['. ', '! ', '? ', ', ', '; ', ': '];
                    for (i = 0; i < breaks.length; i++) {
                        var pos = cut.lastIndexOf(breaks[i]);
                        if (pos > 200 && pos > lastDot) { lastDot = pos + 1; }
                    }
                    if (lastDot === -1) {
                        lastDot = cut.lastIndexOf(' ');
                        if (lastDot < 200) { lastDot = MAX_CHUNK; }
                    }
                    chunks.push(remaining.substring(0, lastDot).replace(/^\s+|\s+$/g, ''));
                    remaining = remaining.substring(lastDot).replace(/^\s+/, '');
                }
                if (remaining.length > 0) { chunks.push(remaining); }
                return chunks;
            }

            function ttsBuildUrl(text) {
                return TTS_PROXY + '?q=' + encodeURIComponent(text) + '&voice=' + encodeURIComponent(ttsVoice) + '&rate=' + encodeURIComponent('+0%');
            }

            // Flatten all items into a single list of chunks for gapless playback
            var ttsAllChunks = [];  // [{text, itemIdx}]
            var ttsChunkPos = 0;

            function ttsBuildChunkList() {
                ttsAllChunks = [];
                for (var i = 0; i < ttsItems.length; i++) {
                    var item = ttsItems[i];
                    var parts = [];
                    if (item.title) { parts.push(item.title + '.'); }
                    var summary = item.summary || item.desc || '';
                    if (summary && summary !== item.title) { parts.push(summary); }
                    var fullText = ttsNormalize(parts.join(' '));
                    var chunks = ttsSplitText(fullText);
                    for (var j = 0; j < chunks.length; j++) {
                        ttsAllChunks.push({ text: chunks[j], itemIdx: i });
                    }
                }
            }

            function ttsPlayOne(text, idx, onEnd) {
                // Legacy wrapper — not used in new gapless flow
                if (onEnd) { onEnd(); }
            }

            function ttsPlayGapless() {
                if (!ttsIsReading) { return; }
                if (ttsChunkPos >= ttsAllChunks.length) {
                    // Check loop
                    var now = new Date().getTime();
                    if (ttsLoopUntil > 0 && now < ttsLoopUntil) {
                        ttsChunkPos = 0;
                    } else {
                        ttsStop();
                        return;
                    }
                }

                var chunk = ttsAllChunks[ttsChunkPos];
                var url = ttsBuildUrl(chunk.text);
                // Use current audio element
                var playing = ttsCurrentAudio;
                var next = (playing === ttsAudioA) ? ttsAudioB : ttsAudioA;

                if (typeof console !== 'undefined' && console.log) {
                    console.log('[TTS-LITE] chunk ' + (ttsChunkPos + 1) + '/' + ttsAllChunks.length + ' item#' + chunk.itemIdx + ':', chunk.text.substring(0, 60));
                }

                var ended = false;
                function finish() {
                    if (ended) { return; }
                    ended = true;
                    clearTimeout(ttsSafetyTimer);
                    ttsChunkPos++;
                    ttsCurrentAudio = next;
                    ttsPlayGapless();
                }

                // Preload next chunk into the other audio element
                if (ttsChunkPos + 1 < ttsAllChunks.length) {
                    var nextUrl = ttsBuildUrl(ttsAllChunks[ttsChunkPos + 1].text);
                    next.src = nextUrl;
                    next.load();
                }

                clearTimeout(ttsSafetyTimer);
                ttsSafetyTimer = setTimeout(finish, 30000);
                playing.onended = finish;
                playing.onerror = function() {
                    if (typeof console !== 'undefined' && console.log) {
                        console.log('[TTS-LITE] Audio error chunk ' + ttsChunkPos);
                    }
                    finish();
                };
                playing.src = url;
                playing.load();
                try {
                    var playResult = playing.play();
                    if (playResult && typeof playResult.then === 'function') {
                        playResult.then(function () { }).catch(function () { finish(); });
                    }
                } catch (e) { finish(); }
                // Watchdog
                setTimeout(function () {
                    if (!ended && playing.paused && playing.currentTime === 0) { finish(); }
                }, 5000);
            }

            // Loop control
            var ttsLoopUntil = 0; // timestamp until which to keep looping

            function ttsStop() {
                ttsIsReading = false;
                ttsCurrentIndex = 0;
                ttsChunkPos = 0;
                ttsLoopUntil = 0;
                clearTimeout(ttsSafetyTimer);
                try { ttsAudioA.pause(); ttsAudioA.src = ''; } catch (e) { }
                try { ttsAudioB.pause(); ttsAudioB.src = ''; } catch (e) { }
                ttsUpdateBtn(false);
            }

            function ttsReadNext() {
                // Now handled by ttsPlayGapless
                ttsPlayGapless();
            }

            // loopMinutes: 0 = read once, N = keep looping for N minutes
            function readNewsNow(loopMinutes) {
                // Tech news trước (summary từ AI), tin thường sau (desc từ RSS)
                var combined = [];
                var i;
                if (typeof console !== 'undefined' && console.log) {
                    console.log('[TTS-LITE] readNewsNow: tech=' + parsedTechItems.length + ', news=' + parsedNewsItems.length);
                }
                for (i = 0; i < parsedTechItems.length; i++) {
                    combined.push({ title: parsedTechItems[i].title || '', summary: parsedTechItems[i].summary || '' });
                }
                for (i = 0; i < parsedNewsItems.length; i++) {
                    combined.push({ title: parsedNewsItems[i].title || '', summary: parsedNewsItems[i].summary || '', desc: parsedNewsItems[i].desc || '' });
                }
                if (!combined.length) { return; }
                ttsItems = combined;
                ttsCurrentIndex = 0;
                ttsChunkPos = 0;
                ttsIsReading = true;
                ttsLoopUntil = (loopMinutes && loopMinutes > 0)
                    ? new Date().getTime() + (loopMinutes * 60000) : 0;
                ttsBuildChunkList();
                ttsUpdateBtn(true);
                ttsPlayGapless();
            }

            function speakText(text) {
                if (!text) { return; }
                // Quick single text — use audio A directly
                var url = ttsBuildUrl(ttsNormalize(text));
                ttsAudioA.src = url;
                ttsAudioA.load();
                try { ttsAudioA.play(); } catch (e) { }
            }

            // ── TECH NEWS — merge vào marquee trên cùng ──
            function loadTechNews() {
                xhrGet('/api/tech-news', function (err, data) {
                    if (err || !data || !data.items || !data.items.length) { return; }
                    parsedTechItems = data.items;
                    buildMarquee(); // rebuild marquee với tech news xen vào
                }, 20000);
            }
            loadTechNews();
            setInterval(loadTechNews, 600000);

            // ── SCHEDULED AUTO-READ ──
            // Default schedule: 06:30. Long-press 🔊 to change.
            var ttsSchedule = '06:30';
            try {
                var saved = localStorage.getItem('lf_tts_schedule');
                if (saved) { ttsSchedule = saved; }
            } catch (e) { }

            // Tap = read/stop, Double-tap = set schedule
            var lastTapTime = 0;

            if (ttsBtn) {
                ttsBtn.onclick = function () {
                    var now = new Date().getTime();
                    var timeSinceLastTap = now - lastTapTime;
                    lastTapTime = now;

                    // Double-tap (within 400ms) = settings
                    if (timeSinceLastTap < 400) {
                        var input = prompt('Hẹn giờ đọc tin tự động (VD: 06:30):', ttsSchedule);
                        if (input && input.indexOf(':') > 0) {
                            ttsSchedule = input;
                            try { localStorage.setItem('lf_tts_schedule', ttsSchedule); } catch (e) { }
                            alert('Đã hẹn đọc tin lúc ' + ttsSchedule + ' mỗi ngày');
                        }
                        return;
                    }

                    // Single tap = read or stop
                    ttsUnlocked = true;
                    if (ttsIsReading) { ttsStop(); } else { readNewsNow(); }
                };
            }

            // Check scheduled time + hourly announce every minute
            var lastScheduleDate = '';
            var lastAnnouncedHour = -1;

            function checkScheduleAndHourly() {
                var now = new Date();
                var h = now.getHours();
                var m = now.getMinutes();
                var hh = (h < 10 ? '0' : '') + h;
                var mm = (m < 10 ? '0' : '') + m;
                var currentTime = hh + ':' + mm;
                var today = now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();

                // Scheduled auto-read
                if (currentTime === ttsSchedule && lastScheduleDate !== today) {
                    lastScheduleDate = today;
                    ttsUnlocked = true;
                    loadNews();
                    setTimeout(function () { readNewsNow(30); }, 10000);
                }

                // Hourly time announcement
                if (ttsUnlocked && m === 0 && h !== lastAnnouncedHour) {
                    lastAnnouncedHour = h;
                    var period = h < 12 ? 'sáng' : (h < 18 ? 'chiều' : 'tối');
                    var displayH = h > 12 ? (h - 12) : (h === 0 ? 12 : h);
                    speakText('Bây giờ là ' + displayH + ' giờ ' + period);
                }
            }
            setInterval(checkScheduleAndHourly, 60000);

        })();
